version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cao_postgres
    environment:
      POSTGRES_DB: cao_db
      POSTGRES_USER: cao_user
      POSTGRES_PASSWORD: cao_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cao_user -d cao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cao_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
